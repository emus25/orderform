<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>EB Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #f5f5f3;
    --surface:    #ffffff;
    --border:     #e8e8e5;
    --border-sub: #f0f0ee;
    --text:       #1a1a1a;
    --text-muted: #888;
    --text-faint: #aaa;
    --text-ghost: #ccc;
    --pill-border:#e0e0dd;
    --input-bg:   #fafafa;
    --accent:     #22a06b;
    --accent-bg:  #f0faf5;
    --submit-bg:  #1a1a1a;
    --submit-fg:  #ffffff;
    --symbol-off: #e0e0dd;
  }
  [data-theme="dark"] {
    --bg:         #111113;
    --surface:    #1c1c20;
    --border:     #2a2a30;
    --border-sub: #222228;
    --text:       #f0f0f2;
    --text-muted: #9090a0;
    --text-faint: #606070;
    --text-ghost: #404050;
    --pill-border:#2e2e38;
    --input-bg:   #18181e;
    --accent:     #b48cff;
    --accent-bg:  #1e1830;
    --submit-bg:  #b48cff;
    --submit-fg:  #0e0a1a;
    --symbol-off: #333340;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Figtree', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-badge {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg); padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Dark mode toggle */
  .theme-toggle {
    width: 36px; height: 20px;
    background: var(--pill-border);
    border-radius: 20px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
    padding: 0;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: transform 0.2s, background 0.2s;
  }
  [data-theme="dark"] .theme-toggle { background: var(--accent-bg); }
  [data-theme="dark"] .theme-toggle::after {
    transform: translateX(16px);
    background: var(--accent);
  }
  .theme-icon { font-size: 14px; line-height: 1; }

  /* Amount hero */
  .amount-hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .amount-hint {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 16px;
  }
  .amount-row { display: flex; align-items: baseline; gap: 4px; }
  .amount-symbol {
    font-size: 32px; font-weight: 600;
    color: var(--symbol-off);
    transition: color 0.15s;
  }
  .amount-symbol.active { color: var(--text); }
  .amount-input {
    font-family: 'Figtree', sans-serif;
    font-size: 64px; font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
    border: none; outline: none;
    background: transparent;
    width: 220px; text-align: center;
    -webkit-appearance: none;
    -moz-appearance: textfield;
    transition: color 0.2s;
  }
  .amount-input::placeholder { color: var(--symbol-off); }
  .amount-input::-webkit-outer-spin-button,
  .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Details */
  .details { padding: 16px 20px 120px; max-width: 520px; width: 100%; margin: 0 auto; }

  .group {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
    transition: background 0.2s, border-color 0.2s;
  }
  .group-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint); padding: 12px 16px 4px;
  }
  .field {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-sub);
    transition: border-color 0.2s;
  }
  .field:last-child { border-bottom: none; }
  label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-muted); margin-bottom: 4px;
  }

  input[type="text"], textarea {
    width: 100%; border: none; outline: none;
    font-family: 'Figtree', sans-serif; font-size: 15px;
    color: var(--text); background: transparent;
    padding: 0; -webkit-appearance: none;
    transition: color 0.2s;
  }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--text-ghost); }
  textarea { resize: none; min-height: 52px; line-height: 1.5; }

  /* Category pills */
  .cat-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-radio { display: none; }
  .cat-pill {
    padding: 6px 13px; border-radius: 20px;
    border: 1.5px solid var(--pill-border);
    font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.12s; user-select: none;
    white-space: nowrap;
  }
  .cat-radio:checked + .cat-pill {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }


  .other-input {
    margin-top: 10px;
    width: 100%;
    border: 1.5px solid var(--pill-border);
    border-radius: 8px;
    outline: none;
    font-family: 'Figtree', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--input-bg);
    padding: 9px 12px;
    transition: border-color 0.15s, background 0.2s;
    display: none;
  }
  .other-input:focus { border-color: var(--accent); }
  .other-input::placeholder { color: var(--text-ghost); }

  /* Submit */
  .submit-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }
  .submit-wrap-inner { max-width: 520px; margin: 0 auto; }
  button[type="submit"] {
    width: 100%; background: var(--submit-bg); color: var(--submit-fg);
    border: none; border-radius: 10px; padding: 15px;
    font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s, background 0.2s, color 0.2s;
    letter-spacing: -0.01em;
  }
  button[type="submit"]:active { opacity: 0.8; }
  button[type="submit"]:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Success */
  .success {
    display: none; position: fixed; inset: 0;
    background: var(--surface);
    flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 32px; text-align: center; z-index: 999;
    transition: background 0.2s;
  }
  .success.show { display: flex; }
  .tick {
    width: 56px; height: 56px;
    background: var(--accent-bg);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 24px; margin-bottom: 20px;
  }
  .success h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; }
  .success p { font-size: 14px; color: var(--text-muted); line-height: 1.6; white-space: pre-line; }
  .success .amount-logged {
    font-size: 13px; font-weight: 600;
    color: var(--accent); margin: 12px 0 28px;
  }
  .new-exp-btn {
    background: var(--bg); border: 1.5px solid var(--pill-border);
    color: var(--text); border-radius: 10px; padding: 13px 32px;
    font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
</style>
</head>
<body>

<header>
  <img id="logoImg" src="https://emus25.github.io/orderform/logo.png" style="height:28px;width:auto;display:block;">
  <div class="header-right">
    <span class="header-badge">Expenses</span>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
  </div>
</header>

<form id="form" onsubmit="handleSubmit(event)">

  <div class="amount-hero">
    <div class="amount-hint">Amount</div>
    <div class="amount-row">
      <span class="amount-symbol" id="symbol">£</span>
      <input
        type="number"
        id="amount"
        class="amount-input"
        placeholder="0.00"
        step="0.01"
        min="0.01"
        inputmode="decimal"
        autocomplete="off"
        autofocus
        oninput="onAmountInput()"
        required
      >
    </div>
  </div>

  <div class="details">

    <div class="group">
      <div class="group-label">Category</div>
      <div class="field">
        <div class="cat-row">
          <input class="cat-radio" type="radio" name="category" id="cat1" value="Petrol" required onchange="onCatChange()">
          <label class="cat-pill" for="cat1">⛽️ Petrol</label>

          <input class="cat-radio" type="radio" name="category" id="cat2" value="Product Cost" onchange="onCatChange()">
          <label class="cat-pill" for="cat2">Product Cost 💷</label>

          <input class="cat-radio" type="radio" name="category" id="cat3" value="BNI Fee" onchange="onCatChange()">
          <label class="cat-pill" for="cat3">BNI Fee 🔴</label>

          <input class="cat-radio" type="radio" name="category" id="cat4" value="Other" onchange="onCatChange()">
          <label class="cat-pill" for="cat4">Other</label>
        </div>
        <input class="other-input" type="text" id="otherInput" placeholder="e.g. Parking, Insurance…" autocomplete="off">
      </div>
    </div>

    <div class="group">
      <div class="group-label">Details</div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="description" placeholder="e.g. BNI Esher annual renewal" autocomplete="off">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="notes" placeholder="Any extra detail…"></textarea>
      </div>
    </div>

  </div>

  <div class="submit-wrap">
    <div class="submit-wrap-inner">
      <button type="submit" id="submitBtn">Log expense →</button>
    </div>
  </div>
</form>

<div class="success" id="successScreen">
  <div class="tick">✓</div>
  <h2>Expense logged</h2>
  <p id="successDesc"></p>
  <div class="amount-logged" id="successAmount"></div>
  <button class="new-exp-btn" onclick="resetForm()">Log another</button>
</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5plF7rrOA-bXlqcU854Lr3glyh0Kn9dwVldENhXEPtZdM6MKanpLV7Qq5xUWaJduSZA/exec';

  // Persist theme across sessions
  (function() {
    var saved = localStorage.getItem('eb-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      // Apply logo after DOM ready
      window.addEventListener('DOMContentLoaded', function() { updateLogo(saved); });
    }
  })();

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('eb-theme', next);
    updateLogo(next);
  }

  function updateLogo(theme) {
    var logo = document.getElementById('logoImg');
    if (!logo) return;
    logo.src = theme === 'dark'
      ? 'https://emus25.github.io/orderform/logowhite.png'
      : 'https://emus25.github.io/orderform/logo.png';
  }

  function onCatChange() {
    var otherChecked = document.getElementById('cat4').checked;
    var otherInput = document.getElementById('otherInput');
    otherInput.style.display = otherChecked ? 'block' : 'none';
    if (otherChecked) otherInput.focus();
  }

  function onAmountInput() {
    var val = document.getElementById('amount').value;
    document.getElementById('symbol').classList.toggle('active', val.length > 0);
  }

  function handleSubmit(e) {
    e.preventDefault();

    var catEl = document.querySelector('input[name="category"]:checked');
    if (!catEl) { alert('Please select a category.'); return; }

    var amount = parseFloat(document.getElementById('amount').value);
    if (!amount || amount <= 0) { alert('Please enter an amount.'); return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    var now = new Date();
    var dateStr = now.toLocaleDateString('en-GB');

    var payload = {
      action:      'logExpense',
      date:        dateStr,
      category:    (catEl.value === 'Other' && document.getElementById('otherInput').value) ? document.getElementById('otherInput').value : catEl.value,
      description: document.getElementById('description').value,
      notes:       document.getElementById('notes').value,
      amount:      amount.toFixed(2)
    };

    var encoded = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
    var script  = document.createElement('script');

    script.onerror = script.onload = function() {
      document.getElementById('successDesc').textContent =
        catEl.value + '\n' + document.getElementById('description').value;
      document.getElementById('successAmount').textContent = '−£' + amount.toFixed(2);
      document.getElementById('successScreen').classList.add('show');
      document.body.removeChild(script);
    };

    script.src = encoded;
    document.body.appendChild(script);
  }

  function resetForm() {
    document.getElementById('form').reset();
    document.getElementById('symbol').classList.remove('active');
    document.getElementById('otherInput').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Log expense →';
    document.getElementById('successScreen').classList.remove('show');
    document.getElementById('amount').focus();
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
