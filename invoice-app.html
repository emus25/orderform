<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Invoices">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="logo.png">
<title>ExposureBoost — Quick Invoice</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Figtree', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 16px; -webkit-font-smoothing: antialiased; min-height: 100dvh; }

  header { background: #1a1a1a; padding: 18px 20px; display: flex; align-items: center; justify-content: center; }
  header img { height: 28px; width: auto; display: block; }

  .page { padding: 24px 18px 60px; max-width: 520px; margin: 0 auto; }

  .toggle { display: flex; background: #fff; border: 1px solid #e0e0dd; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
  .toggle button {
    flex: 1; border: none; background: transparent; padding: 10px; border-radius: 8px;
    font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; color: #888; cursor: pointer;
  }
  .toggle button.active { background: #1a1a1a; color: #fff; }

  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e5; padding: 16px; margin-bottom: 16px; }
  .card-label { font-size: 12px; font-weight: 600; color: #999; letter-spacing: 0.3px; margin-bottom: 10px; text-transform: uppercase; }

  textarea.quickline {
    width: 100%; font-family: 'Figtree', sans-serif; font-size: 15px; padding: 12px 14px;
    border: 1px solid #e0e0dd; border-radius: 10px; background: #fff; color: #1a1a1a; resize: vertical; min-height: 64px;
  }
  textarea.quickline:focus { outline: none; border-color: #22a06b; }
  .parse-btn {
    width: 100%; margin-top: 10px; background: #f0f0ee; color: #1a1a1a; border: none; border-radius: 10px;
    padding: 12px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .parse-btn:active { opacity: 0.8; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; }
  .field input[type=text], .field input[type=number] {
    width: 100%; font-family: 'Figtree', sans-serif; font-size: 15px; padding: 12px 14px;
    border: 1px solid #e0e0dd; border-radius: 10px; background: #fff; color: #1a1a1a;
  }
  .field input:focus { outline: none; border-color: #22a06b; }
  .field input.invalid { border-color: #e53e3e; }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }

  .item-row { border-top: 1px solid #f0f0ee; padding-top: 14px; margin-top: 14px; position: relative; }
  .item-row:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  .item-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .item-row-head span { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.3px; }
  .remove-item-btn { background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
  .remove-item-btn:hover { color: #e53e3e; }
  .add-item-btn {
    width: 100%; margin-top: 14px; background: #f0f0ee; color: #1a1a1a; border: none; border-radius: 10px;
    padding: 12px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .add-item-btn:active { opacity: 0.8; }

  @keyframes shake {
    10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s; }

  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .checkbox-row input { width: 18px; height: 18px; }
  .checkbox-row label { font-size: 14px; color: #555; }

  .total-preview { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 2px 2px; border-top: 1px solid #f0f0ee; margin-top: 14px; }
  .total-preview span:first-child { font-size: 13px; color: #888; }
  .total-preview span:last-child { font-size: 20px; font-weight: 600; }

  .error-msg { display: none; background: #fff8f0; border: 1px solid #fed7aa; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #92400E; margin-bottom: 16px; line-height: 1.5; }
  .error-msg.show { display: block; }

  .generate-btn {
    width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 10px;
    padding: 16px; font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: -0.01em;
  }
  .generate-btn:active { opacity: 0.8; }
  .generate-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .success { display: none; position: fixed; inset: 0; background: #fff; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; text-align: center; z-index: 999; }
  .success.show { display: flex; }
  .tick { width: 60px; height: 60px; background: #22a06b; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .tick svg { width: 26px; height: 26px; }
  .success h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
  .success p { font-size: 14px; color: #888; line-height: 1.6; max-width: 320px; margin-bottom: 24px; }
  .success .ref { font-size: 13px; color: #999; margin-bottom: 20px; }
  .success .download-btn {
    width: 100%; max-width: 280px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px;
    padding: 14px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
    text-decoration: none; display: block; margin-bottom: 12px;
  }
  .success .new-btn {
    width: 100%; max-width: 280px; background: transparent; color: #555; border: 1px solid #e0e0dd; border-radius: 10px;
    padding: 14px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <img src="logowhite.png" alt="ExposureBoost">
</header>

<div class="page">
  <div class="toggle">
    <button type="button" id="btnInvoice" class="active" onclick="setDocType('invoice')">Invoice</button>
    <button type="button" id="btnQuote" onclick="setDocType('quote')">Quote</button>
  </div>

  <div class="card">
    <div class="card-label">Speak or type the order</div>
    <textarea class="quickline" id="quickline"></textarea>
    <button type="button" class="parse-btn" onclick="parseQuickline()">Parse into fields below</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="card">
    <div class="field">
      <label>Company / customer name</label>
      <input type="text" id="fCompany">
    </div>
    <div class="field">
      <label>Email (optional)</label>
      <input type="text" id="fEmail">
    </div>

    <div id="itemsContainer"></div>

    <button type="button" class="add-item-btn" onclick="addItemRow()">+ Add another item</button>

    <div class="total-preview">
      <span>Total</span>
      <span id="totalPreview">£0.00</span>
    </div>
  </div>

  <div class="card" id="invoiceOnlyCard">
    <div class="field">
      <label>Custom payment link (optional)</label>
      <input type="text" id="fPayLink">
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="fIsPaid">
      <label for="fIsPaid">Mark as already paid</label>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generateDoc()">Generate PDF</button>
</div>

<div class="success" id="successScreen">
  <div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
  <h2 id="successTitle">Done</h2>
  <div class="ref" id="successRef"></div>
  <p>The PDF has also been emailed to you — grab it here or from your inbox to forward on.</p>
  <a class="download-btn" id="downloadBtn" href="#">Download PDF</a>
  <button class="new-btn" onclick="resetForm()">Create another</button>
</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcMfHCK9FHp8RZXnJBDOQ-5vLheJT4g0vo7hC5-7wGyHYnbY2TpmXnC1qjLtBmTW92pA/exec';
  var SHEET_TOKEN = 'asdfgmhmtmrymnnrbvrf24t62452523.';

  var docType = 'invoice';
  var itemRowCount = 0;

  function setDocType(t) {
    docType = t;
    document.getElementById('btnInvoice').classList.toggle('active', t === 'invoice');
    document.getElementById('btnQuote').classList.toggle('active', t === 'quote');
    document.getElementById('invoiceOnlyCard').style.display = (t === 'invoice') ? 'block' : 'none';
  }

  function addItemRow(prefill) {
    itemRowCount++;
    var id = itemRowCount;
    var container = document.getElementById('itemsContainer');
    var row = document.createElement('div');
    row.className = 'item-row';
    row.dataset.rowId = id;
    row.innerHTML =
      '<div class="item-row-head"><span>Item</span>' +
        '<button type="button" class="remove-item-btn" onclick="removeItemRow(' + id + ')">&times;</button></div>' +
      '<div class="field"><label>Description</label><input type="text" class="fItem"></div>' +
      '<div class="row2">' +
        '<div class="field"><label>Qty</label><input type="number" class="fQty" min="0" step="1"></div>' +
        '<div class="field"><label>Unit price £</label><input type="number" class="fPrice" min="0" step="0.01"></div>' +
      '</div>';
    container.appendChild(row);

    row.querySelector('.fQty').addEventListener('input', updateTotal);
    row.querySelector('.fPrice').addEventListener('input', updateTotal);
    row.querySelector('.fItem').addEventListener('blur', function () {
      this.value = canonicalizeItemName(this.value.trim());
    });

    if (prefill) {
      if (prefill.item) row.querySelector('.fItem').value = prefill.item;
      if (prefill.qty) row.querySelector('.fQty').value = prefill.qty;
      if (prefill.price) row.querySelector('.fPrice').value = prefill.price;
    }
    renumberItemRows();
    return row;
  }

  function removeItemRow(id) {
    var container = document.getElementById('itemsContainer');
    if (container.children.length <= 1) return;
    var row = container.querySelector('[data-row-id="' + id + '"]');
    if (row) row.remove();
    renumberItemRows();
    updateTotal();
  }

  function renumberItemRows() {
    var rows = document.getElementById('itemsContainer').children;
    for (var i = 0; i < rows.length; i++) {
      rows[i].querySelector('.item-row-head span').textContent = 'Item ' + (i + 1);
    }
  }

  function getItemRows() {
    return Array.prototype.slice.call(document.getElementById('itemsContainer').children);
  }

  function parseQuickline() {
    var text = document.getElementById('quickline').value.trim();
    if (!text) return;

    var btn = document.querySelector('.parse-btn');
    var originalLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Parsing…';
    document.getElementById('errorMsg').classList.remove('show');

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'parseQuickInvoiceText', token: SHEET_TOKEN, text: text })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        if (data.status !== 'success') throw new Error(data.message || 'parse failed');

        if (data.company) document.getElementById('fCompany').value = titleCase(data.company);
        if (data.email) document.getElementById('fEmail').value = data.email;

        document.getElementById('itemsContainer').innerHTML = '';
        itemRowCount = 0;
        var items = (data.items && data.items.length) ? data.items : [{}];
        items.forEach(function (it) {
          var raw = it.item || '';
          var canon = canonicalizeItemName(raw);
          var itemText = (canon !== raw) ? canon : titleCase(raw);
          addItemRow({
            item: itemText,
            qty: it.qty || '',
            price: it.unitPrice || ''
          });
        });

        updateTotal();
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = originalLabel;
        showError('Could not parse that — please fill in the fields below manually, or try rephrasing.');
      });
  }

  // Maps loose product mentions ("metal cards", "wood card", "table talker")
  // to your actual catalog names. Anything that doesn't match a known
  // product is left exactly as typed — never invents a name for a custom item.
  function canonicalizeItemName(raw) {
    var s = raw.toLowerCase();
    if (/\bstands?\b|\btable\s*talkers?\b/.test(s)) return 'Digital Table Stand';
    if (/\bkeyring/.test(s)) return 'NFC Keyring';
    if (/\bmetal\b/.test(s)) return 'Metal Digital Business Card';
    if (/\bplastic\b/.test(s)) return 'Plastic Digital Business Card';
    if (/\bbamboo\b/.test(s)) return 'Bamboo Digital Business Card';
    if (/\bwood(en)?\b/.test(s)) return 'Wood Digital Business Card';
    return raw;
  }

  // "city piling" -> "City Piling" — so lazily-typed/dictated names still
  // look right on the PDF, without forcing case on things already capitalized.
  function titleCase(s) {
    return String(s || '').replace(/\w\S*/g, function (w) {
      return w.charAt(0).toUpperCase() + w.slice(1);
    });
  }

  function updateTotal() {
    var total = 0;
    getItemRows().forEach(function (row) {
      var qty = parseFloat(row.querySelector('.fQty').value) || 0;
      var price = parseFloat(row.querySelector('.fPrice').value) || 0;
      total += qty * price;
    });
    document.getElementById('totalPreview').textContent = '£' + total.toFixed(2);
  }

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function shakeField(el) {
    el.classList.add('invalid', 'shake');
    setTimeout(function () { el.classList.remove('shake'); }, 400);
  }

  function generateDoc() {
    var companyEl = document.getElementById('fCompany');
    companyEl.classList.remove('invalid');
    document.getElementById('errorMsg').classList.remove('show');

    var rows = getItemRows();
    var missing = [];
    var items = [];

    rows.forEach(function (row) {
      var itemEl = row.querySelector('.fItem');
      var qtyEl = row.querySelector('.fQty');
      var priceEl = row.querySelector('.fPrice');
      [itemEl, qtyEl, priceEl].forEach(function (el) { el.classList.remove('invalid'); });

      var item = itemEl.value.trim();
      var qty = parseFloat(qtyEl.value);
      var price = parseFloat(priceEl.value);

      if (!item) missing.push(itemEl);
      if (!qty || qty <= 0) missing.push(qtyEl);
      if (isNaN(price) || price < 0) missing.push(priceEl);

      items.push({ item: item, qty: qty, unitPrice: price });
    });

    var company = companyEl.value.trim();
    if (!company) missing.push(companyEl);

    if (missing.length) {
      missing.forEach(shakeField);
      showError('Please fill in company and every item field.');
      return;
    }

    var btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    var payload = {
      action:    'createQuickInvoice',
      token:     SHEET_TOKEN,
      docType:   docType,
      company:   company,
      email:     document.getElementById('fEmail').value.trim(),
      items:     items,
      payLink:   document.getElementById('fPayLink').value.trim(),
      isPaid:    document.getElementById('fIsPaid').checked
    };

    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.status !== 'success') throw new Error(data.message || 'failed');

        document.getElementById('successTitle').textContent = (docType === 'quote' ? 'Quote' : 'Invoice') + ' created';
        document.getElementById('successRef').textContent = data.reference;

        var blob = base64ToBlob(data.pdfBase64, 'application/pdf');
        var url = URL.createObjectURL(blob);
        var dl = document.getElementById('downloadBtn');
        dl.href = url;
        dl.download = (docType === 'quote' ? 'Quote ' : 'Invoice ') + data.reference + '.pdf';

        document.getElementById('successScreen').classList.add('show');
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = 'Generate PDF';
        showError('Something went wrong — please try again or message ediz@exposureboost.com');
      });
  }

  function base64ToBlob(base64, mimeType) {
    var byteChars = atob(base64);
    var byteNumbers = new Array(byteChars.length);
    for (var i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
    return new Blob([new Uint8Array(byteNumbers)], { type: mimeType });
  }

  function resetForm() {
    document.getElementById('quickline').value = '';
    document.getElementById('fCompany').value = '';
    document.getElementById('fEmail').value = '';
    document.getElementById('fPayLink').value = '';
    document.getElementById('fIsPaid').checked = false;
    document.getElementById('itemsContainer').innerHTML = '';
    itemRowCount = 0;
    addItemRow();
    updateTotal();
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('generateBtn').textContent = 'Generate PDF';
    document.getElementById('successScreen').classList.remove('show');
  }

  document.getElementById('fCompany').addEventListener('blur', function () {
    this.value = titleCase(this.value.trim());
  });

  addItemRow();
</script>
</body>
</html>
